<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OG Image Generator - Screenshot this at 1200x630</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .og {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 50%, #0f1923 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: 'Georgia', serif;
  }
  .og::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border: 2px solid rgba(201, 168, 76, 0.3);
    margin: 20px;
    pointer-events: none;
  }
  .og::after {
    content: '';
    position: absolute;
    top: 30px; left: 30px; right: 30px; bottom: 30px;
    border: 1px solid rgba(201, 168, 76, 0.15);
    pointer-events: none;
  }
  .logo-text {
    font-size: 120px;
    font-weight: 700;
    font-style: italic;
    color: #fff;
    letter-spacing: 2px;
    margin-bottom: 5px;
    font-family: 'Brush Script MT', 'Segoe Script', cursive;
  }
  .doo {
    font-size: 42px;
    font-weight: 700;
    color: #c9a84c;
    letter-spacing: 12px;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
    margin-top: -10px;
  }
  .line {
    width: 80px;
    height: 3px;
    background: #c41e1e;
    margin: 20px 0;
  }
  .tagline {
    font-size: 22px;
    color: rgba(255,255,255,0.7);
    font-family: 'Inter', 'Segoe UI', sans-serif;
    font-weight: 300;
    letter-spacing: 1px;
  }
  .since {
    position: absolute;
    bottom: 45px;
    font-size: 16px;
    color: rgba(201, 168, 76, 0.6);
    letter-spacing: 6px;
    text-transform: uppercase;
    font-family: 'Inter', 'Segoe UI', sans-serif;
  }
</style>
</head>
<body>
<div class="og">
  <div class="logo-text">Marco</div>
  <div class="doo">DOO</div>
  <div class="line"></div>
  <div class="tagline">Marketing · Inženjering · Konsalting</div>
  <div class="since">Since 1993 · Novi Sad</div>
</div>
</body>
</html>
